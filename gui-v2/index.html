<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Career-Ops Command Center</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <div id="app">
      <aside class="sidebar">
        <div class="logo">
          <div class="logo-icon">🚀</div>
          <span>Career-Ops</span>
        </div>
        <nav>
          <button class="nav-item active" data-view="dashboard" data-title="Dashboard">
            <span class="icon">📊</span> Dashboard
          </button>
          <button class="nav-item" data-view="pipeline" data-title="Pipeline">
            <span class="icon">📥</span> Pipeline
          </button>
          <button class="nav-item" data-view="evaluator" data-title="Evaluator">
            <span class="icon">🧠</span> Evaluator
          </button>
          <button class="nav-item" data-view="profile" data-title="Profile">
            <span class="icon">👤</span> Profile
          </button>
          <button class="nav-item" data-view="cv" data-title="CV Generator">
            <span class="icon">📄</span> CV Generator
          </button>
          <button class="nav-item" data-view="remote" data-title="Remote Jobs">
            <span class="icon">🌍</span> Remote Jobs
          </button>
        </nav>
        <div class="sidebar-footer">
          <div style="margin-bottom: 12px">
            <label class="stat-label">Scan Companies</label>
            <select id="scan-companies" multiple style="width: 100%; height: 120px; background: var(--bg-dark); border: 1px solid var(--glass-border); color: white; border-radius: 4px; padding: 4px; font-size: 11px;">
              <!-- Populated dynamically -->
            </select>
          </div>
          <div style="margin-bottom: 12px">
            <label class="stat-label">Scan Regions</label>
            <select id="scan-regions" multiple style="width: 100%; height: 120px; background: var(--bg-dark); border: 1px solid var(--glass-border); color: white; border-radius: 4px; padding: 4px; font-size: 11px;">
              <optgroup label="Primary">
                <option value="india" selected>India (Bengaluru/NCR)</option>
                <option value="germany" selected>Germany (DACH)</option>
                <option value="europe" selected>Europe (EMEA)</option>
                <option value="remote" selected>Remote (Global)</option>
              </optgroup>
              <optgroup label="North America">
                <option value="usa">USA</option>
                <option value="canada">Canada</option>
              </optgroup>
              <optgroup label="Other Hubs">
                <option value="uae">UAE / Middle East</option>
                <option value="uk">UK / London</option>
                <option value="singapore">Singapore</option>
                <option value="australia">Australia</option>
              </optgroup>
            </select>
            <input id="custom-region" type="text" placeholder="Custom keyword (e.g. Berlin)" style="width: 100%; margin-top: 4px; background: var(--bg-dark); border: 1px solid var(--glass-border); color: white; border-radius: 4px; padding: 4px; font-size: 11px;">
          </div>
          <button id="btn-scan" class="btn-primary" style="width: 100%; margin-bottom: 8px">Scan Portals</button>
          <button id="btn-deep-scan" class="btn-secondary" style="width: 100%; margin-bottom: 8px; border-color: #ffd700; color: #ffd700;">✨ Deep Search (AI)</button>
          <button id="btn-sync" class="btn-secondary" style="width: 100%">Sync Tracker</button>
        </div>
      </aside>

      <main class="content">
        <header class="top-bar">
          <h1 id="view-title">Dashboard</h1>
          <div class="user-info">
            <span id="user-name">Venkatesh</span>
            <div class="status-dot"></div>
          </div>
        </header>

        <section id="view-container">
          <!-- Views will be injected here -->
        </section>
      </main>

      <!-- Report Viewer Modal -->
      <div id="report-overlay" class="hidden">
        <div class="report-panel">
          <div class="report-panel-header">
            <span id="report-filename">report.md</span>
            <button id="close-report">×</button>
          </div>
          <div id="report-content"></div>
        </div>
      </div>

      <!-- Apply Modal -->
      <div id="apply-modal" class="hidden">
        <div class="apply-panel">
          <div class="apply-panel-header">
            <div>
              <div id="apply-title" style="font-size: 18px; font-weight: 700; font-family: 'Outfit', sans-serif">Apply</div>
              <div id="apply-subtitle" style="color: var(--text-muted); font-size: 13px; margin-top: 4px"></div>
            </div>
            <button id="close-apply-modal">×</button>
          </div>
          <div class="apply-panel-body">
            <div class="apply-field-group">
              <label class="apply-field-label">Job URL</label>
              <div style="display: flex; gap: 8px; align-items: center">
                <input id="apply-url-input" type="text" class="apply-url-input" placeholder="https://jobs.greenhouse.io/... or paste here" />
                <button class="btn-icon" id="apply-open-url" title="Open in browser" style="font-size: 20px">↗</button>
              </div>
            </div>
            <div style="border-top: 1px solid var(--glass-border); padding-top: 16px">
              <div style="font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); margin-bottom: 10px">Your Details (from profile.yml)</div>
              <div id="apply-profile-fields" style="display: flex; flex-direction: column; gap: 8px"></div>
            </div>
            <div class="apply-field-group">
              <label class="apply-field-label">Attach CV PDF</label>
              <select id="apply-cv-select" class="apply-url-input" style="font-family: inherit; cursor: pointer">
                <option value="">-- No attachment (add manually in browser) --</option>
              </select>
            </div>
            <div style="display: flex; gap: 10px; padding-top: 4px">
              <button id="btn-autofill" class="btn-primary" style="flex: 1">🤖 Auto-fill Form</button>
              <button id="btn-mark-applied" class="btn-secondary" style="flex: 1; border-color: #10b981; color: #10b981">✅ Mark as Applied</button>
            </div>
            <p style="font-size: 11px; color: var(--text-muted); text-align: center; margin-top: 4px">Auto-fill opens a browser window — review all fields before submitting</p>
          </div>
        </div>
      </div>

      <div id="terminal-overlay" class="hidden">
        <div class="terminal">
          <div class="terminal-header">
            <span>Live Process</span>
            <button id="close-terminal">×</button>
          </div>
          <pre id="terminal-output"></pre>
        </div>
      </div>
    </div>
    <script type="module" src="./src/app.js"></script>
  </body>
</html>
